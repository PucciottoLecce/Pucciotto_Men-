<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menù</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lobster', cursive;
            background-color: white;
            color: black;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background-color: black;
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            text-transform: uppercase;
        }

        .back-button {
            background-color: red;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            border-radius: 5px;
        }

        .back-button:hover {
            background-color: black;
        }

        .content {
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        .menu-image {
            max-width: 100%;
            height: auto;
            border: 3px solid black;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Menù</h1>
        <a href="index.html" class="back-button">Torna alla Home</a>
    </div>
    <div class="content">
        <img src="menù.png" alt="Menù" class="menu-image">
    </div>
</body>
</html>
